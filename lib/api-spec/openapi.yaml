openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: ExpatEvents API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: events
    description: Event operations
  - name: groups
    description: Group operations
  - name: members
    description: Member operations
  - name: dashboard
    description: Dashboard operations
  - name: rsvps
    description: RSVP operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List events with optional filters
      parameters:
        - name: city
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: upcoming
          in: query
          schema:
            type: boolean
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items:
                      $ref: "#/components/schemas/Event"
                  total:
                    type: integer
                required: [events, total]
    post:
      operationId: createEvent
      tags: [events]
      summary: Create a new event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventBody"
      responses:
        "201":
          description: Event created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"

  /events/{eventId}:
    get:
      operationId: getEvent
      tags: [events]
      summary: Get event details
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Event details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        "404":
          description: Not found

  /events/{eventId}/rsvp:
    post:
      operationId: rsvpEvent
      tags: [rsvps]
      summary: RSVP to an event
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RsvpBody"
      responses:
        "200":
          description: RSVP recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rsvp"

  /events/{eventId}/attendees:
    get:
      operationId: listEventAttendees
      tags: [rsvps]
      summary: List attendees of an event
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of attendees
          content:
            application/json:
              schema:
                type: object
                properties:
                  attendees:
                    type: array
                    items:
                      $ref: "#/components/schemas/Member"
                  total:
                    type: integer
                required: [attendees, total]

  /groups:
    get:
      operationId: listGroups
      tags: [groups]
      summary: List groups
      parameters:
        - name: city
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of groups
          content:
            application/json:
              schema:
                type: object
                properties:
                  groups:
                    type: array
                    items:
                      $ref: "#/components/schemas/Group"
                  total:
                    type: integer
                required: [groups, total]
    post:
      operationId: createGroup
      tags: [groups]
      summary: Create a new group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGroupBody"
      responses:
        "201":
          description: Group created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"

  /groups/{groupId}:
    get:
      operationId: getGroup
      tags: [groups]
      summary: Get group details
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Group details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"
        "404":
          description: Not found

  /groups/{groupId}/join:
    post:
      operationId: joinGroup
      tags: [groups]
      summary: Join a group
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinGroupBody"
      responses:
        "200":
          description: Joined group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupMembership"

  /groups/{groupId}/members:
    get:
      operationId: listGroupMembers
      tags: [groups]
      summary: List members of a group
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of members
          content:
            application/json:
              schema:
                type: object
                properties:
                  members:
                    type: array
                    items:
                      $ref: "#/components/schemas/Member"
                  total:
                    type: integer
                required: [members, total]

  /members:
    get:
      operationId: listMembers
      tags: [members]
      summary: List community members
      parameters:
        - name: city
          in: query
          schema:
            type: string
        - name: nationality
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of members
          content:
            application/json:
              schema:
                type: object
                properties:
                  members:
                    type: array
                    items:
                      $ref: "#/components/schemas/Member"
                  total:
                    type: integer
                required: [members, total]

  /members/{memberId}:
    get:
      operationId: getMember
      tags: [members]
      summary: Get member profile
      parameters:
        - name: memberId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Member profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        "404":
          description: Not found

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/upcoming-events:
    get:
      operationId: getUpcomingEvents
      tags: [dashboard]
      summary: Get upcoming events for dashboard
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 5
      responses:
        "200":
          description: Upcoming events
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items:
                      $ref: "#/components/schemas/Event"
                required: [events]

  /dashboard/popular-groups:
    get:
      operationId: getPopularGroups
      tags: [dashboard]
      summary: Get most popular groups
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 5
      responses:
        "200":
          description: Popular groups
          content:
            application/json:
              schema:
                type: object
                properties:
                  groups:
                    type: array
                    items:
                      $ref: "#/components/schemas/Group"
                required: [groups]

  /dashboard/recent-members:
    get:
      operationId: getRecentMembers
      tags: [dashboard]
      summary: Get recently joined members
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 8
      responses:
        "200":
          description: Recent members
          content:
            application/json:
              schema:
                type: object
                properties:
                  members:
                    type: array
                    items:
                      $ref: "#/components/schemas/Member"
                required: [members]

  /events/categories:
    get:
      operationId: listEventCategories
      tags: [events]
      summary: Get event categories with counts
      responses:
        "200":
          description: Event categories
          content:
            application/json:
              schema:
                type: object
                properties:
                  categories:
                    type: array
                    items:
                      $ref: "#/components/schemas/CategoryCount"
                required: [categories]

  /cities:
    get:
      operationId: listCities
      tags: [dashboard]
      summary: Get available cities with member counts
      responses:
        "200":
          description: Cities list
          content:
            application/json:
              schema:
                type: object
                properties:
                  cities:
                    type: array
                    items:
                      $ref: "#/components/schemas/CityCount"
                required: [cities]

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Event:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        date:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        city:
          type: string
        venue:
          type: string
        address:
          type: string
        category:
          type: string
        imageUrl:
          type: string
        hostId:
          type: integer
        hostName:
          type: string
        attendeeCount:
          type: integer
        maxAttendees:
          type: integer
        isFree:
          type: boolean
        price:
          type: number
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - description
        - date
        - city
        - venue
        - category
        - hostId
        - hostName
        - attendeeCount
        - isFree
        - createdAt

    CreateEventBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        date:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        city:
          type: string
        venue:
          type: string
        address:
          type: string
        category:
          type: string
        imageUrl:
          type: string
        maxAttendees:
          type: integer
        isFree:
          type: boolean
        price:
          type: number
      required:
        - title
        - description
        - date
        - city
        - venue
        - category
        - isFree

    Group:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        city:
          type: string
        category:
          type: string
        imageUrl:
          type: string
        memberCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - description
        - city
        - category
        - memberCount
        - createdAt

    CreateGroupBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        city:
          type: string
        category:
          type: string
        imageUrl:
          type: string
      required:
        - name
        - description
        - city
        - category

    Member:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        avatarUrl:
          type: string
        bio:
          type: string
        city:
          type: string
        nationality:
          type: string
        interests:
          type: array
          items:
            type: string
        joinedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - city
        - nationality
        - joinedAt

    RsvpBody:
      type: object
      properties:
        memberId:
          type: integer
        status:
          type: string
          enum: [going, interested, not_going]
      required:
        - memberId
        - status

    Rsvp:
      type: object
      properties:
        id:
          type: integer
        eventId:
          type: integer
        memberId:
          type: integer
        status:
          type: string
          enum: [going, interested, not_going]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - eventId
        - memberId
        - status
        - createdAt

    JoinGroupBody:
      type: object
      properties:
        memberId:
          type: integer
      required:
        - memberId

    GroupMembership:
      type: object
      properties:
        id:
          type: integer
        groupId:
          type: integer
        memberId:
          type: integer
        joinedAt:
          type: string
          format: date-time
      required:
        - id
        - groupId
        - memberId
        - joinedAt

    DashboardSummary:
      type: object
      properties:
        totalEvents:
          type: integer
        totalGroups:
          type: integer
        totalMembers:
          type: integer
        upcomingEventsCount:
          type: integer
        citiesCount:
          type: integer
      required:
        - totalEvents
        - totalGroups
        - totalMembers
        - upcomingEventsCount
        - citiesCount

    CategoryCount:
      type: object
      properties:
        category:
          type: string
        count:
          type: integer
      required:
        - category
        - count

    CityCount:
      type: object
      properties:
        city:
          type: string
        memberCount:
          type: integer
        eventCount:
          type: integer
      required:
        - city
        - memberCount
        - eventCount
